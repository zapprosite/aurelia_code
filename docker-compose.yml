networks:
  aurelia-net:
    driver: bridge
    name: aurelia-net
services:
  aurelia-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurelia-api
    environment:
    - GOMEMLIMIT=512MiB
    - GOGC=100
    - AURELIA_API_PORT=8484
    - AURELIA_HOME=/tmp/.aurelia
    - STT_PROVIDER=groq
    - STT_MODEL=whisper-large-v3-turbo
    - STT_BASE_URL=https://api.groq.com/openai/v1
    - STT_LANGUAGE=pt
    - REDIS_URL=redis://aurelia-redis-1:6379
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    - GROQ_API_KEY=${GROQ_API_KEY}
    healthcheck:
      interval: 30s
      retries: 3
      test:
      - CMD-SHELL
      - wget --no-verbose --tries=1 --spider http://localhost:8484/health || exit
        1
      timeout: 10s
    networks:
    - aurelia-net
    ports:
    - 8080:8484
    restart: always
    volumes:
    - ./.env:/app/.env:ro
    - ./.env.example:/app/.env.example:ro
    - ./data:/app/data
    - ./knowledge:/tmp/.aurelia/memory/personas:ro
  qdrant:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    image: qdrant/qdrant:v1.17.1
    ports:
    - 6333:6333
    - 6334:6334
    volumes:
    - ./data/qdrant:/qdrant/storage:z
  redis:
    command: redis-server --dir /data --appendonly yes --appendfsync everysec
    healthcheck:
      interval: 10s
      retries: 5
      start_period: 10s
      test:
      - CMD
      - redis-cli
      - -h
      - localhost
      - ping
      timeout: 5s
    image: redis:7.2.4-alpine
    ports:
    - 6379:6379
    restart: always
    volumes:
    - ./data/redis:/data
  smart-router:
    command:
    - --config
    - /app/config.yaml
    container_name: aurelia-smart-router
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    env_file:
    - .env
    environment:
    - REDIS_HOST=host.docker.internal
    - REDIS_PORT=6380
    - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD-SHELL
      - python3 -c "import httpx; r = httpx.get('http://localhost:4000/health', timeout=5);
        exit(0 if r.status_code in (200, 401) else 1)"
      timeout: 15s
    image: ghcr.io/berriai/litellm:main-stable
    ports:
    - 4000:4000
    - 8484:8484
    - 3334:3334
    restart: always
    volumes:
    - ./configs/litellm/config.yaml:/app/config.yaml
  voxtral:
    command:
    - serve
    - mistralai/Voxtral-4B-TTS-2603
    - --gpu-memory-utilization
    - '0.10'
    - --max-model-len
    - '4096'
    container_name: aurelia-voxtral
    deploy:
      resources:
        reservations:
          devices:
          - capabilities:
            - gpu
            count: all
            driver: nvidia
    environment:
    - CUDA_VISIBLE_DEVICES=0
    - HF_TOKEN=${HF_TOKEN}
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    image: vllm/vllm-openai:v0.18.0
    networks:
    - aurelia-net
    ports:
    - 8012:8000
    restart: always
  whisper-stt:
    container_name: whisper-local
    environment:
    - WHISPER_MODEL=medium
    - WHISPER_DEVICE=cpu
    healthcheck:
      interval: 30s
      retries: 5
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      timeout: 10s
    image: fedirz/faster-whisper-server:latest-cpu
    networks:
    - aurelia-net
    ports:
    - 8020:8000
    restart: always
