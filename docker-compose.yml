services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage:z


  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --dir /data --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  smart-router:
    container_name: aurelia-smart-router
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
      - "8484:8484"
      - "3334:3334"
    volumes:
      - ./configs/litellm/config.yaml:/app/config.yaml
    env_file:
      - .env
    command: ["--config", "/app/config.yaml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import httpx; r = httpx.get('http://localhost:4000/health', timeout=5); exit(0 if r.status_code in (200, 401) else 1)\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # Kokoro TTS — 100% local (CPU fallback, GPU preferred)
  # ADR: 20260330-kokoro-gpu-local.md
  kokoro-tts:
    container_name: aurelia-kokoro
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    ports:
      - "8012:8880"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8880/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Whisper STT — 100% local (faster-whisper-server GPU)
  # ADR: 20260330-stt-local-first-cascade.md
  whisper-stt:
    container_name: whisper-local
    image: fedirz/faster-whisper-server:latest-cuda
    ports:
      - "127.0.0.1:8020:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  redis_data:
