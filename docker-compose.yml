services:
  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage:z
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s


  redis:
    image: redis:7.2.4-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --dir /data --appendonly yes --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  smart-router:
    container_name: aurelia-smart-router
    image: ghcr.io/berriai/litellm:v1.34.0
    ports:
      - "4000:4000"
      - "8484:8484"
      - "3334:3334"
    volumes:
      - ./configs/litellm/config.yaml:/app/config.yaml
    env_file:
      - .env
    command: ["--config", "/app/config.yaml"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import httpx; r = httpx.get('http://localhost:4000/health', timeout=5); exit(0 if r.status_code in (200, 401) else 1)\""]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s

  # Voxtral TTS — Mistral 4B, voice cloning zero-shot, PT-BR nativo
  # ADR: 20260331-voxtral-replaces-kokoro.md
  voxtral-tts:
    container_name: aurelia-voxtral
    image: vllm/vllm-openai:v0.18.0
    command: >
      vllm serve mistralai/Voxtral-4B-TTS-2603
      --omni
      --gpu-memory-utilization 0.45
      --trust-remote-code
      --port 8880
    ports:
      - "8012:8880"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ./assets/voice:/app/voices:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8880/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Whisper STT — 100% local (faster-whisper-server GPU)
  # ADR: 20260330-stt-local-first-cascade.md
  whisper-stt:
    container_name: whisper-local
    image: fedirz/faster-whisper-server:0.6.0-rc.3-cuda
    ports:
      - "127.0.0.1:8020:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
  # ─── CORE 2: AURELIA SYSTEM API (GOVERNANCE GATEWAY) ───────────────────
  aurelia-api:
    build:
      context: services/aurelia-api
    container_name: aurelia-api
    restart: always
    ports:
      - "${AURELIA_API_PORT:-8080}:8080"
    environment:
      - GOMEMLIMIT=512MiB
      - GOGC=100
      - AURELIA_API_PORT=8080
    volumes:
      - ./.env:/home/will/aurelia/.env:ro
      - ./.env.example:/home/will/aurelia/.env.example:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # networks:
    #   - aurelia-net # Using default for now or add if needed

volumes:
  redis_data:
