# Aurélia Smart Router — 01/04/2026
# Camada 0: local (gemma3:27b ops-cron)
# Camada 1: free cloud (Nemotron 3 Super → Qwen3.6 Plus)
# Camada 2: pago long-context (MiniMax 2.7 → GLM 5.1 → Kimi 2.5)

model_list:

  # ── CHAT GERAL: free primary ─────────────────────────────────────────────
  - model_name: chat-default
    litellm_params:
      model: openrouter/nvidia/nemotron-3-super-120b-a12b:free
      api_key: os.environ/OPENROUTER_API_KEY
      stream: true
      timeout: 45

  - model_name: chat-free-second
    litellm_params:
      model: openrouter/qwen/qwen3.6-plus-preview:free
      api_key: os.environ/OPENROUTER_API_KEY
      stream: true
      timeout: 45

  # ── PAGO LONG-CONTEXT: fallback quando free falha ────────────────────────
  - model_name: chat-paid-minimax
    litellm_params:
      model: openrouter/minimax/minimax-m2.7
      api_key: os.environ/OPENROUTER_API_KEY
      stream: true
      timeout: 45

  - model_name: chat-paid-glm
    litellm_params:
      model: openrouter/zhipuai/glm-4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      stream: true
      timeout: 45

  - model_name: chat-paid-kimi
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.5
      api_key: os.environ/OPENROUTER_API_KEY
      stream: true
      timeout: 60

  # ── OPS / FISCAL / CRON: gemma3:27b local (sem cloud, sem logging) ───────
  - model_name: ops-cron
    litellm_params:
      model: ollama/gemma3:27b-it-qat
      api_base: http://172.17.0.1:11434
      stream: false
      timeout: 120
      rpm: 1

  - model_name: ops-cron-retry
    litellm_params:
      model: ollama/gemma3:27b-it-qat
      api_base: http://172.17.0.1:11434
      stream: false
      timeout: 240
      rpm: 1

  # ── EMBEDDING: nomic-embed-text local ────────────────────────────────────
  - model_name: embedding
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://172.17.0.1:11434
      mode: embedding

router_settings:
  routing_strategy: latency-based-routing
  num_retries: 2
  retry_after: 5
  allowed_fails: 2
  cooldown_time: 30

  fallbacks:
    - {"chat-default":     ["chat-free-second", "chat-paid-minimax", "chat-paid-glm", "chat-paid-kimi"]}
    - {"chat-free-second": ["chat-paid-minimax", "chat-paid-glm", "chat-paid-kimi"]}
    - {"ops-cron":         ["ops-cron-retry"]}

  context_window_fallbacks:
    - {"chat-default": ["chat-paid-kimi"]}
    - {"ops-cron":     ["chat-paid-kimi"]}

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: null
  disable_spend_logs: false
  max_budget: 15.0
  budget_duration: 1mo
