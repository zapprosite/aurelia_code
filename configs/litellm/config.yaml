# LiteLLM Configuration — Aurelia Smart Router
# ⚠️ API KEYS via Environment Variables (não hardcoded)

model_list:
  # --- NÍVEL 1 (SOBERANO LOCAL) ---
  - model_name: gemma3-local
    litellm_params:
      model: ollama/gemma3:12b
      api_base: http://localhost:11434
      priority: 1

  - model_name: gemma3-27b-lab
    litellm_params:
      model: ollama/gemma3:27b-it-q4_K_M
      api_base: http://localhost:11434
      priority: 2

  # --- NÍVEL 2 (PAID ENGINEERING) ---
  - model_name: groq-cheap
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: GROQ_API_KEY_PLACEHOLDER
      priority: 3

  - model_name: groq-smart
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: GROQ_API_KEY_PLACEHOLDER
      priority: 3

  # --- NÍVEL 3 (PREMIUM) ---
  - model_name: openrouter-minimax
    litellm_params:
      model: openrouter/minimaxai/minimax-abliter:latest
      api_key: OPENROUTER_API_KEY_PLACEHOLDER
      priority: 4

  - model_name: openrouter-claude
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: OPENROUTER_API_KEY_PLACEHOLDER
      priority: 4

  # --- JUDGE (SOBERANO) ---
  - model_name: judge
    litellm_params:
      model: ollama/gemma3:27b-it-q4_K_M
      api_base: http://localhost:11434
      priority: 0

router_settings:
  redis_host: localhost
  redis_port: 6379
  routing_strategy: latency-based
  retry_policy:
    max_retries: 3
    timeout: 30

litellm_settings:
  drop_params: true
  set_verbose: false
  json_response: true
