# LiteLLM Configuration — Cascade Jarvis Local-First (SOTA 2026)
# RTX 4090 24GB VRAM — 50-80% requests served locally, cloud fallback
# Cascade: local → qwen3.6-free → minimax-free → groq-free → paid
# ADR: 20260330-qwen36-free-litellm-cascade.md
# API KEYS via Environment Variables

model_list:
  # ─── Priority 1: LOCAL (RTX 4090 24GB) ─────────────────────────────
  - model_name: aurelia-smart
    litellm_params:
      model: ollama/qwen3.5:9b
      api_base: http://host.docker.internal:11434
      timeout: 45
    model_info:
      tier: free

  - model_name: aurelia-vision
    litellm_params:
      model: ollama/qwen3.5:9b
      api_base: http://host.docker.internal:11434
      timeout: 45

  - model_name: aurelia-fast
    litellm_params:
      model: ollama/qwen3.5:9b
      api_base: http://host.docker.internal:11434
      timeout: 30

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://host.docker.internal:11434
    model_info:
      mode: embedding

  # ─── Priority 2: QWEN 3.6 PLUS FREE (OpenRouter) ──────────────────
  - model_name: aurelia-smart
    litellm_params:
      model: openrouter/qwen/qwen-3.6-plus-preview:free
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 60
    model_info:
      tier: free

  # ─── Priority 3: MINIMAX 2.5 FREE (OpenRouter) ──────────────────
  - model_name: aurelia-smart
    litellm_params:
      model: openrouter/minimax/minimax-2.5:free
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 60
    model_info:
      tier: free

  # ─── Priority 4: GROQ FREE ───────────────────────────────────────
  - model_name: aurelia-smart
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      timeout: 30
    model_info:
      tier: free

  # ─── Priority 10+: PAID (último recurso) ─────────────────────────
  - model_name: aurelia-smart
    litellm_params:
      model: openrouter/minimax/minimax-m2.7
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 60
    model_info:
      tier: paid

  - model_name: aurelia-smart
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.5
      api_key: os.environ/OPENROUTER_API_KEY
      timeout: 60
    model_info:
      tier: paid

router_settings:
  routing_strategy: priority
  num_retries: 3
  allowed_fails: 2
  cooldown_time: 30
  retry_after: 2
  timeout: 90
  retry_policy:
    RateLimitError:
      num_retries: 3
      retry_after: 10

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
