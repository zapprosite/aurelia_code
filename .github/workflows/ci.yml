name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.8'

      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o ./build/aurelia ./cmd/aurelia

      - name: Homelab Smoke Script
        run: bash ./scripts/smoke-test-homelab.sh

      - name: E2E Smoke
        run: go test ./e2e -run TestSmoke -timeout 60s
